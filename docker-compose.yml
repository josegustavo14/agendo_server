services:

  # Banco de dados PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: agendo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agendo_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agendo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicação Spring Boot (desenvolvimento com hot reload)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agendo-app
    ports:
      - "9090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agendo_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: "1234"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
    volumes:
      - ./src:/app/src
      - ./build.gradle:/app/build.gradle
      - ./gradle:/app/gradle
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  # Aplicação Spring Boot (produção)
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: agendo-app-prod
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agendo_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: "1234"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - prod

volumes:
  postgres_data: