# ConfiguraĂ§Ă£o usada em todos os testes (unitários via @SpringBootTest,
# integraçăo e Cucumber). Ativada com @ActiveProfiles("test").
#
# Usa H2 em memória no modo de compatibilidade PostgreSQL. O schema é
# gerado pelo Hibernate a partir das entidades (ddl-auto=create-drop),
# entăo o Flyway Ă© desabilitado nos testes e assim evitamos lidar com
# sintaxe especificaçăo do Postgres (BIGSERIAL etc.) dentro do H2.

spring.datasource.url=jdbc:h2:mem:agendo_test;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# DataSeeder fica desligado nos testes (cada teste cria seus próprios dados)
app.seed.enabled=false

# AbacatePay com credenciais fake. O AbacatePayClient é sempre mockado
# (@MockitoBean) nos testes, entĂ£o essas chamadas nunca saem de verdade.
abacatepay.api-key=test-api-key
abacatepay.base-url=http://localhost:8080
abacatepay.webhook-secret=test-webhook-secret-123
abacatepay.return-url=http://localhost/pagamento/cancelado
abacatepay.completion-url=http://localhost/pagamento/sucesso
