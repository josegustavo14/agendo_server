spring.application.name=server

# Spring Boot DevTools - Hot Reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agendo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_FORMAT_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.security.user.name=admin
spring.security.user.password=admin

# Seed de dados (popula o banco na primeira execução se estiver vazio)
app.seed.enabled=${APP_SEED_ENABLED:true}

# Payment
# Os valores de DEV ficam como default. Em produção (VPS), sobrescreva
# definindo as variáveis de ambiente ABACATEPAY_API_KEY e ABACATEPAY_WEBHOOK_SECRET.
abacatepay.api-key=${ABACATEPAY_API_KEY:abc_dev_HguFzywEJpUrPuEYQhTKqCJY}
abacatepay.base-url=${ABACATEPAY_BASE_URL:https://api.abacatepay.com/v1}
abacatepay.webhook-secret=${ABACATEPAY_WEBHOOK_SECRET:9KsfavZWdEzEDyKy}

# URL pública base da aplicação.
# Default = ambiente local (ngrok). Em produção, o perfil "prod"
# (application-prod.properties) sobrescreve este valor.
app.public-url=https://jellied-lizard-babble.ngrok-free.dev

# URLs de redirecionamento de pagamento (derivadas da URL pública base)
abacatepay.return-url=${app.public-url}/pagamento/cancelado
abacatepay.completion-url=${app.public-url}/pagamento/sucesso