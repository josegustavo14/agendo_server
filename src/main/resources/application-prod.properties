# ============================================================
# Perfil de PRODUÇĂO (VPS oortcloud.com.br)
# Ativado com: SPRING_PROFILES_ACTIVE=prod
#
# Este arquivo sobrescreve APENAS o que muda em produçăo.
# Tudo o mais é herdado de application.properties.
# Segredos (api-key, webhook-secret, senha do banco) continuam
# vindo de variáveis de ambiente ? năo coloque valores reais aqui.
# ============================================================

# URL pública da VPS ? usada para montar return-url e completion-url
app.public-url=https://oortcloud.com.br

# Em produçăo normalmente năo se usa o DevTools
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false